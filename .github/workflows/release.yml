name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            os_name: windows

          # macOS Universal（同时支持 Apple Silicon / Intel）
          - platform: macos-14
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            os_name: macos-universal

          # Linux x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            os_name: linux

    runs-on: ${{ matrix.platform }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.CHANGELOG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 提取版本号
      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      # Linux 依赖
      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            imagemagick

      # macOS 依赖
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install imagemagick

      # 生成各平台所需的图标格式
      - name: Generate icons
        shell: bash
        run: |
          cd src-tauri/icons
          # 生成不同尺寸的PNG (确保RGBA格式)
          if command -v magick &> /dev/null; then
            magick icon.png -resize 32x32 -define png:color-type=6 32x32.png
            magick icon.png -resize 128x128 -define png:color-type=6 128x128.png
            magick icon.png -resize 256x256 -define png:color-type=6 128x128@2x.png
          else
            convert icon.png -resize 32x32 -define png:color-type=6 32x32.png
            convert icon.png -resize 128x128 -define png:color-type=6 128x128.png
            convert icon.png -resize 256x256 -define png:color-type=6 128x128@2x.png
          fi
          # macOS icns
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            mkdir -p icon.iconset
            sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
            sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
            sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
            sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
            sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
            sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
            sips -z 512 512 icon.png --out icon.iconset/icon_512x512@2x.png
            iconutil -c icns icon.iconset -o icon.icns
            rm -rf icon.iconset
          fi
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      # 提取 CHANGELOG 中当前版本的更新内容
      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION_NUM="${VERSION#v}"  # 移除 v 前缀

          # 从 CHANGELOG.md 提取当前版本的内容
          CHANGELOG=$(awk "/## \[${VERSION_NUM}\]/,/## \[/" CHANGELOG.md | sed '$d' | tail -n +2)

          # 如果提取失败，使用默认内容
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="查看完整更新日志: [CHANGELOG.md](https://github.com/EmbeddedKitOrg/EK-OmniProbe/blob/main/CHANGELOG.md)"
          fi

          # 输出到 GitHub Actions 环境变量（处理多行）
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'EK-OmniProbe ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            ## EK-OmniProbe RTTVIEW

            ### 📦 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows** | `*_x64-setup.exe` | NSIS 安装程序 |
            | **Windows** | `*_x64_portable.exe` | 便携版（免安装） |
            | **macOS (Universal)** | `*_universal.dmg` | 同时支持 Apple Silicon 与 Intel |
            | **Linux** | `*_amd64.deb` | Debian/Ubuntu |
            | **Linux** | `*_amd64.AppImage` | 通用Linux |

            ### 💻 系统要求
            - **Windows**: Windows 10/11 64位，需要WebView2运行时
            - **macOS**: macOS 11.0+ (Big Sur或更高), 通用版支持 Apple Silicon / Intel
            - **Linux**: 需要WebKitGTK和libusb


            完整更新历史: [CHANGELOG.md](https://github.com/EmbeddedKitOrg/EK-OmniProbe/blob/main/CHANGELOG.md)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} ${{ matrix.os_name == 'windows' && '--bundles nsis' || '' }}

      # Windows 便携版：上传单独的 exe 文件
      - name: Upload Windows portable exe
        if: matrix.os_name == 'windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          EXE_PATH="src-tauri/target/x86_64-pc-windows-msvc/release/ek-omniprobe.exe"

          if [ -f "$EXE_PATH" ]; then
            PORTABLE_NAME="EK-OmniProbe_${VERSION}_x64_portable.exe"
            cp "$EXE_PATH" "$PORTABLE_NAME"
            gh release upload "$TAG" "$PORTABLE_NAME" --clobber
            echo "Uploaded Windows portable: $PORTABLE_NAME"
          else
            echo "Warning: Portable exe not found at $EXE_PATH"
          fi

      # 保存平台键名到 artifact（用于后续合并）
      - name: Save platform info
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          mkdir -p platform-info

          case "$TARGET" in
            "x86_64-pc-windows-msvc")
              echo "windows-x86_64" > platform-info/platform.txt
              ;;
            "universal-apple-darwin")
              echo "darwin-universal" > platform-info/platform.txt
              ;;
            "x86_64-unknown-linux-gnu")
              echo "linux-x86_64" > platform-info/platform.txt
              ;;
          esac

      - name: Upload platform info
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.target }}
          path: platform-info/
          retention-days: 1

  # 汇总所有平台的更新信息并生成统一的 latest.json
  merge-updater:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Release assets to be accessible
        # needs: build 已确保所有构建完成，这里只等待 GitHub API 缓冲
        run: sleep 120

      - name: Generate merged latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ needs.build.outputs.version }}"
          TAG="v${VERSION}"
          REPO="EmbeddedKitOrg/EK-OmniProbe"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Generating merged latest.json for version ${VERSION}"

          # 从 CHANGELOG.md 提取当前版本的内容
          CHANGELOG=$(awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | sed '$d' | tail -n +2)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="查看完整更新日志: https://github.com/${REPO}/blob/main/CHANGELOG.md"
          fi

          ASSET_NAMES=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          echo "Release assets:"
          echo "$ASSET_NAMES"

          mkdir -p downloads/signatures
          echo '{}' > platforms.json

          get_asset_name() {
            local pattern="$1"
            echo "$ASSET_NAMES" | grep -E "$pattern" | grep -v '\.sig$' | head -n 1 || true
          }

          get_signature() {
            local asset_name="$1"
            local sig_name="${asset_name}.sig"

            if [ -z "$asset_name" ]; then
              return 0
            fi

            if echo "$ASSET_NAMES" | grep -Fxq "$sig_name"; then
              gh release download "$TAG" --pattern "$sig_name" --dir downloads/signatures --clobber >/dev/null
              tr -d '\r\n' < "downloads/signatures/${sig_name}"
            fi
          }

          add_platform() {
            local key="$1"
            local url="$2"
            local signature="$3"

            if [ -z "$url" ] || [ -z "$signature" ]; then
              echo "Skip platform ${key}: missing updater asset or signature"
              return 0
            fi

            jq \
              --arg key "$key" \
              --arg url "$url" \
              --arg signature "$signature" \
              '. + {($key): {signature: $signature, url: $url}}' \
              platforms.json > platforms.tmp
            mv platforms.tmp platforms.json
            echo "Added platform ${key}"
          }

          WIN_NAME=$(get_asset_name '\.nsis\.zip$')
          MAC_NAME=$(get_asset_name '\.app\.tar\.gz$')
          LINUX_NAME=$(get_asset_name '\.AppImage\.tar\.gz$')

          if [ -n "$WIN_NAME" ]; then
            WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${WIN_NAME}"
            WIN_SIG=$(get_signature "$WIN_NAME")
            add_platform "windows-x86_64" "$WIN_URL" "$WIN_SIG"
          fi

          if [ -n "$MAC_NAME" ]; then
            MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/${MAC_NAME}"
            MAC_SIG=$(get_signature "$MAC_NAME")
            add_platform "darwin-aarch64" "$MAC_URL" "$MAC_SIG"
            add_platform "darwin-x86_64" "$MAC_URL" "$MAC_SIG"
            add_platform "darwin-universal" "$MAC_URL" "$MAC_SIG"
          fi

          if [ -n "$LINUX_NAME" ]; then
            LINUX_URL="https://github.com/${REPO}/releases/download/${TAG}/${LINUX_NAME}"
            LINUX_SIG=$(get_signature "$LINUX_NAME")
            add_platform "linux-x86_64" "$LINUX_URL" "$LINUX_SIG"
          fi

          if [ "$(jq 'length' platforms.json)" -eq 0 ]; then
            echo "No valid updater assets with signatures were found."
            exit 1
          fi

          # 转义 CHANGELOG 中的特殊字符用于 JSON
          CHANGELOG_JSON=$(echo "$CHANGELOG" | jq -Rs '.')

          # 生成 latest.json
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": ${CHANGELOG_JSON},
            "pub_date": "${PUB_DATE}",
            "platforms": $(cat platforms.json)
          }
          EOF

          # 格式化 JSON
          cat latest.json | jq '.' > latest_formatted.json
          mv latest_formatted.json latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Delete old latest.json from Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          # 删除可能已存在的 latest.json（由各平台 job 上传的）
          gh release delete-asset $TAG latest.json -y 2>/dev/null || true

      - name: Upload merged latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
